# 本地開發環境（VS Code Devcontainer 引用此檔）。
# _build/、deps/、node_modules/ 走 Named Volumes，避開 macOS bind mount 的 I/O 瓶頸。
services:
  dev:
    build: .devcontainer
    command: sleep infinity
    working_dir: /workspace
    volumes:
      - .:/workspace
      - backend_build:/workspace/backend/_build
      - backend_deps:/workspace/backend/deps
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "4000:4000" # Phoenix
      - "5173:5173" # Vite
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  backend_build:
  backend_deps:
  frontend_node_modules:
  pg_data:
